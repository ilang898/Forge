trigger:
- master

pr:
- master
- feature/*

resources:
  repositories:
  - repository: templates
    type: git
    name: OneBranch.Pipelines/GovernedTemplates
    ref: refs/heads/main

variables:
  BuildConfiguration: Release

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates
  parameters:
    globalSdl:
      tsa:
        enabled: false
      policheck:
        break: true
    stages:
    - stage: build
      jobs:
      - job: main
        # Force use of Azure DevOps hosted VMs instead of OneBranch managed pools
        pool:
          vmImage: 'windows-2022'  # This ensures standard Azure DevOps VMs
        
        variables:
        - name: ob_outputDirectory
          value: '$(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT'
        - name: ob_nugetPublishing_enabled
          value: true
        
        steps:
        # Install .NET SDK first
        - task: UseDotNet@2
          displayName: 'Install .NET 6.0 SDK'
          inputs:
            packageType: 'sdk'
            version: '6.0.100'
            
        - task: UseDotNet@2
          displayName: 'Install .NET 2.1 Runtime'
          inputs:
            packageType: 'runtime'
            version: '2.1.23'

        # Test connectivity (should work fine on standard VMs)
        - powershell: |
              Write-Host "=== Testing NuGet.org connectivity on Azure DevOps VM ==="
              Write-Host "Agent: $(Agent.Name)"
              Write-Host "Pool: $(Agent.JobName)"
              try {
                $resp = Invoke-WebRequest -Uri "https://api.nuget.org/v3/index.json" -UseBasicParsing
                Write-Host "✅ NuGet.org is reachable. Status: $($resp.StatusCode)"
              } catch {
                Write-Host "❌ NuGet.org connectivity issue: $_"
                exit 1
              }
          displayName: "Test NuGet.org connectivity"

        # Standard NuGet restore
        - task: NuGetCommand@2
          displayName: 'NuGet restore'
          inputs:
            restoreSolution: '$(Build.SourcesDirectory)\Forge.sln'
            verbosityRestore: 'normal'
          retryCountOnTaskFailure: 3

        - task: VSBuild@1
          displayName: 'Build .NET sln for tests'
          inputs:
            solution: '$(Build.SourcesDirectory)\Forge.sln'
            platform: 'Any CPU'
            configuration: $(BuildConfiguration)
