trigger:
- master

pr:
- master
- feature/*

resources:
  repositories:
  - repository: templates
    type: git
    name: OneBranch.Pipelines/GovernedTemplates
    ref: refs/heads/main

variables:
  CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)]
  BuildConfiguration: Release

extends:
  template: v2/OneBranch.NonOfficial.CrossPlat.yml@templates
  parameters:
    globalSdl:
      tsa:
        enabled: false
      policheck:
        break: true
      credscan:
        enabled: true
        suppressionsFile: $(Build.SourcesDirectory)\.config\CredScanSuppressions.json
      binskim:
        enabled: false
    
    # This is critical - OneBranch templates need this structure
    featureFlags:
      WindowsHostVersion:
        Version: 2022
    
    stages:
    - stage: build
      displayName: 'Build Stage'
      jobs:
      - job: main
        displayName: 'Build and Test Job'
        # Use OneBranch managed pool instead of vmImage
        pool:
          type: windows
        
        variables:
        - name: ob_outputDirectory
          value: '$(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT'
        - name: ob_git_checkout
          value: true
        
        steps:
        - powershell: |
            Write-Host "=== Build Job Started Successfully ==="
            Write-Host "Build ID: $(Build.BuildId)"
            Write-Host "Source Branch: $(Build.SourceBranch)"
            Write-Host "Reason: $(Build.Reason)"
          displayName: "Verify Build Job Execution"
        
        - task: UseDotNet@2
          displayName: 'Install .NET 6.0 SDK'
          inputs:
            packageType: 'sdk'
            version: '6.0.100'
            
        - task: UseDotNet@2
          displayName: 'Install .NET 2.1 Runtime'
          inputs:
            packageType: 'runtime'
            version: '2.1.23'

        - task: NuGetCommand@2
          displayName: 'NuGet restore'
          inputs:
            restoreSolution: '$(Build.SourcesDirectory)\Forge.sln'
          retryCountOnTaskFailure: 3

        - task: VSBuild@1
          displayName: 'Build .NET sln for tests'
          inputs:
            solution: '$(Build.SourcesDirectory)\Forge.sln'
            platform: 'Any CPU'
            configuration: $(BuildConfiguration)
            
        - task: VSTest@2
          displayName: 'Run Tests'
          inputs:
            testAssemblyVer2: |
              $(Build.SourcesDirectory)\Forge.TreeWalker.UnitTests\obj\Release\Microsoft.Forge.TreeWalker.UnitTests.dll
            runInParallel: True
            
        - task: VSBuild@1
          displayName: 'Build .NET sln and pack'
          inputs:
            solution: '$(Build.SourcesDirectory)\Forge.sln'
            platform: 'Any CPU'
            configuration: $(BuildConfiguration)
            msbuildArgs: '-t:pack'
