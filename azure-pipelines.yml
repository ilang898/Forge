trigger:
- master

resources:
  repositories:
  - repository: onebranchTemplates
    type: git
    name: OneBranch.Pipelines/GovernedTemplates
    ref: refs/heads/main

variables:
  WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2019/vse2019:latest'

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@onebranchTemplates
  parameters:
    globalSdl:
      tsa:
        enabled: false
      policheck:
        break: true
    stages:
    - stage: stage
      jobs:
      - job: job
        pool:
          type: windows
        variables:
        - name: ob_nugetPublishing_enabled
          value: true
        - name: ob_outputDirectory
          value: '$(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT'
        steps:
        - powershell: |
              [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
              Write-Host "Testing connectivity to NuGet.org..."
              try {
                $resp = Invoke-WebRequest -Uri "https://api.nuget.org/v3/index.json" -UseBasicParsing
                Write-Host "NuGet.org is reachable."
                Write-Host "Response status: $($resp.StatusCode)"
              } catch {
                Write-Host "NuGet.org is NOT reachable."
                Write-Host "Error: $_"
                Write-Host "Attempting to diagnose network connectivity..."
                
                # Test basic internet connectivity
                try {
                  $testResp = Invoke-WebRequest -Uri "https://www.microsoft.com" -UseBasicParsing
                  Write-Host "Microsoft.com is reachable, network appears functional"
                } catch {
                  Write-Host "No internet connectivity detected"
                }
                
                # Check DNS resolution
                try {
                  $dnsResult = Resolve-DnsName -Name "api.nuget.org"
                  Write-Host "DNS resolution for api.nuget.org successful: $($dnsResult.IPAddress -join ', ')"
                } catch {
                  Write-Host "DNS resolution failed for api.nuget.org"
                }
                
                exit 1
              }
          displayName: "Test NuGet.org connectivity"

        - task: NuGetCommand@2
          displayName: 'NuGet restore'
          inputs:
            restoreSolution: '$(Build.SourcesDirectory)\Forge.sln'
          retryCountOnTaskFailure: 3
