trigger:
- master   # Manual trigger for testing

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates
  parameters:
    stages:
    - stage: Build
      jobs:
      - job: TestNuGetConnectivity
        pool:
          vmImage: 'windows-2019'
        steps:
        - powershell: |
            Write-Host "Testing connectivity to NuGet.org..."
            try {
              $resp = Invoke-WebRequest -Uri "https://api.nuget.org/v3/index.json" -UseBasicParsing
              Write-Host "NuGet.org is reachable."
            } catch {
              Write-Host "NuGet.org is NOT reachable."
              Write-Host $_
              exit 1
            }
          displayName: "Test NuGet.org connectivity"
        - task: NuGetToolInstaller@1
          displayName: "Install NuGet"
        - task: NuGetCommand@2
          displayName: "NuGet Restore"
          inputs:
            restoreSolution: '**/*.sln'
