trigger:
- master

pr:
- master
- feature/*

resources:
  repositories:
  - repository: templates
    type: git
    name: OneBranch.Pipelines/GovernedTemplates
    ref: refs/heads/main

variables:
  BuildConfiguration: Release
  # OneBranch requires these specific variables
  CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)]

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates
  parameters:
    # Enable build stages explicitly
    cloudvault:
      enabled: false
    globalSdl:
      tsa:
        enabled: false
      policheck:
        break: true
      # Disable some SDL checks that might block job execution
      credscan:
        enabled: true
      binskim:
        enabled: false
    
    # Critical: Add git configuration to ensure proper checkout
    git:
      fetchDepth: 1
    
    stages:
    - stage: build
      displayName: 'Build Stage'
      jobs:
      - job: main
        displayName: 'Build and Test Job'
        pool:
          vmImage: 'windows-2022'
        
        variables:
        - name: ob_outputDirectory
          value: '$(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT'
        - name: ob_nugetPublishing_enabled
          value: true
        # Critical: Add this variable to enable job execution
        - name: ob_git_checkout
          value: true
        
        steps:
        # Add debug step to verify job is running
        - powershell: |
              Write-Host "=== Job Execution Started ==="
              Write-Host "Build Reason: $(Build.Reason)"
              Write-Host "Source Branch: $(Build.SourceBranch)"
              Write-Host "Agent: $(Agent.Name)"
              Write-Host "Working Directory: $(System.DefaultWorkingDirectory)"
              Write-Host "Source Directory: $(Build.SourcesDirectory)"
              Write-Host "=== OneBranch Variables ==="
              Write-Host "ob_outputDirectory: $(ob_outputDirectory)"
              Write-Host "ob_git_checkout: $(ob_git_checkout)"
          displayName: "Debug: Verify Job Execution"

        # Install .NET SDK first
        - task: UseDotNet@2
          displayName: 'Install .NET 6.0 SDK'
          inputs:
            packageType: 'sdk'
            version: '6.0.100'
            
        - task: UseDotNet@2
          displayName: 'Install .NET 2.1 Runtime'
          inputs:
            packageType: 'runtime'
            version: '2.1.23'

        # Test connectivity
        - powershell: |
              Write-Host "=== Testing NuGet.org connectivity ==="
              try {
                $resp = Invoke-WebRequest -Uri "https://api.nuget.org/v3/index.json" -UseBasicParsing
                Write-Host "✅ NuGet.org is reachable. Status: $($resp.StatusCode)"
              } catch {
                Write-Host "❌ NuGet.org connectivity issue: $_"
                exit 1
              }
          displayName: "Test NuGet.org connectivity"

        # Standard NuGet restore
        - task: NuGetCommand@2
          displayName: 'NuGet restore'
          inputs:
            restoreSolution: '$(Build.SourcesDirectory)\Forge.sln'
            verbosityRestore: 'normal'
          retryCountOnTaskFailure: 3
