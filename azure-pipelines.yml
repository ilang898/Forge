#################################################################################
#                      OneBranch Pipelines - PR Build                           #
# This pipeline was created by EasyStart from a sample located at:              #
#   https://aka.ms/obpipelines/easystart/samples                                #
# Documentation:  https://aka.ms/obpipelines                                    #
# Yaml Schema:    https://aka.ms/obpipelines/yaml/schema                        #
# Retail Tasks:   https://aka.ms/obpipelines/tasks                              #
# Support:        https://aka.ms/onebranchsup                                   #
#################################################################################
 
name: $(MAJOR).$(Date:yyyy).$(Date:MMdd).$(Rev:r)
 
trigger:
- master
 
resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main
 
parameters: # parameters are shown up in ADO UI in a build queue time
- name: 'debug'
  displayName: 'Enable debug output'
  type: boolean
  default: false
- name: 'DialtoneBuildPhase'
  displayName: 'Dialtone Build Phase'
  type: string 
  default: DTONLINE
  values:
  - DTONLINE
  - DTONPREM
# Queue time parameter - set to OBP to run pipeline wholly in Cloud-based OneBranch Pipelines
- name: 'DialtoneBuildEnvironment'
  displayName: 'Dialtone Build Environment'
  type: string
  default: OBP
  values:
  - DT
  - OBP
# Queue time parameter - set to run in Dialtone Event mode
- name: 'IsDialtoneEvent'
  displayName: 'Is Dialtone Event?'
  type: boolean
  default: false
# Queue time parameter - set to run Dialtone portion in network isolation from Azure with firewall rules
- name: 'EnableNetworkIsolation'
  displayName: 'Simulate Dialtone by network isolation'
  type: boolean
  default: true
# Queue time parameter - set to publish nuget packages
- name: 'PublishNugetPackages'
  displayName: 'Publish Nuget Packages'
  type: boolean
  default: false
 
variables:
  CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)] # needed for onebranch.pipeline.version task https://aka.ms/obpipelines/versioning
  system.debug: ${{ parameters.debug }}
  ENABLE_PRS_DELAYSIGN: 0
  OUTPUTROOT: $(Build.SourcesDirectory)\out
  NUGET_XMLDOC_MODE: none
  MAJOR: 133
  MINOR: $[format('{0:yyyy}', pipeline.startTime)]
  REVISION: $[counter(variables['MINOR'], 1)]
  Configuration: 'Release'
  Platform: 'x64'
 
  WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2022/vse2022:latest' # Docker image which is used to build the project https://aka.ms/obpipelines/containers
  
  ForgeSln: '$(Build.SourcesDirectory)\Forge.sln'

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates
  parameters:
    featureFlags:
      EnableCDPxPAT: false
    WindowsHostVersion: '1ESWindows2022'
    cloudvault:
      enabled: true
    globalSdl:
      tsa:
        enabled: false
      binskim:
        break: true
      policheck:
        break: true
      roslyn:
        break: true
    nugetPublishing:
      feeds:
        - name: One/ForgeArtifacts
          files_to_publish: '**/*.nupkg;!**/*.symbols.nupkg'
          continueOnConflict: false
    stages:
    - stage: build
      templateContext:
        dialtoneEnabled: false
      jobs:
      - job: main
        pool:
          type: windows
        variables:
          ob_vsodrop_enabled: true
          ob_vsodrop_adoInstance: msazure
          ob_vsodrop_subfolder: ''
          ob_outputDirectory: '$(OUTPUTROOT)'
          ob_sdl_binskim_break: true
          ob_nugetPublishing_enabled: ${{ parameters.PublishNugetPackages }}
          ob_nugetPublishingDir: packages
        templateContext:
          dialtoneEnabled: false
        steps:
        - task: UseDotNet@2
          continueOnError: true
          inputs:
            packageType: 'sdk'
            useGlobalJson: true
            performMultiLevelLookup: true
