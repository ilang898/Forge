
trigger:
  - master

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

parameters:
  - name: 'debug'
    displayName: 'Enable debug output'
    type: boolean
    default: false
  - name: 'PublishNugetPackages'
    displayName: 'Publish Nuget Packages'
    type: boolean
    default: false

variables:
  system.debug: ${{ parameters.debug }}
  OUTPUTROOT: $(Build.SourcesDirectory)\out
  Configuration: 'Release'
  Platform: 'Any CPU'
  ForgeSln: '$(Build.SourcesDirectory)\Forge.sln'
  WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2022/vse2022:latest'

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates
  parameters:
    nugetPublishing:
      feeds:
        - name: One/ForgeArtifacts
      files_to_publish: '**/*.nupkg;!**/*.symbols.nupkg'
      continueOnConflict: false
    stages:
      - stage: build
        jobs:
          - job: main
            displayName: 'Forge Build and Publish'
            pool:
              type: windows
              container:
                image: $(WindowsContainerImage)
            variables:
              ob_outputDirectory: '$(OUTPUTROOT)'
              ob_nugetPublishing_enabled: ${{ parameters.PublishNugetPackages }}
              ob_nugetPublishingDir: packages
            steps:
              # 1. NuGet Restore
              - task: NuGetCommand@2
                displayName: 'NuGet restore'
                inputs:
                  restoreSolution: '$(ForgeSln)'

              # 2. Build .NET sln for tests
              - task: VSBuild@1
                displayName: 'Build .NET sln for tests'
                inputs:
                  solution: '$(ForgeSln)'
                  platform: 'Any CPU'
                  configuration: 'Release'

              # 3. Run Tests
              - task: VSTest@2
                displayName: 'Run Tests'
                inputs:
                  testAssemblyVer2: |
                    $(Build.SourcesDirectory)\Forge.TreeWalker.UnitTests\obj\Release\Microsoft.Forge.TreeWalker.UnitTests.dll
                  runInParallel: true

              # 4. Build .NET sln and pack
              - task: VSBuild@1
                displayName: 'Build .NET sln and pack'
                inputs:
                  solution: '$(ForgeSln)'
                  platform: 'Any CPU'
                  configuration: 'Release'
                  msbuildArgs: '-t:pack'

              # 5. Install .NET SDK
              - task: UseDotNet@2
                displayName: 'Install .NET SDK'
                inputs:
                  packageType: 'sdk'
                  version: '6.0.100'

              # 6. Install .NET Runtime
              - task: UseDotNet@2
                displayName: 'Install .NET Runtime'
                inputs:
                  packageType: 'runtime'
                  version: '2.1.23'

              # 7. ESRP CodeSigning - Authenticode MI
              - task: EsrpCodeSigning@5
                displayName: 'ESRP CodeSigning - Authenticode MI'
                inputs:
                  ConnectedServiceName: 'ForgeManagedIdentity'
                  UseMSIAuthentication: true
                  AppRegistrationClientId: 'ee5bddcd-7e6d-40c7-a645-8f0be9da4e24'
                  AppRegistrationTenantId: '33e01921-4d64-4f8c-a055-5bdaffd5e33d'
                  EsrpClientId: 'ec6597cc-b900-43a4-9d2b-ffc5cc4f8c56'
                  AuthAKVName: 'ForgeKeyVault2'
                  AuthSignCertName: 'ForgeKeyVault2Certificate'
                  ServiceEndpointUrl: 'https://api.esrp.microsoft.com/api/v2'
                  signConfigType: 'inlineSignParams'
                  FolderPath: '$(Build.SourcesDirectory)\Forge.TreeWalker\bin\Release'
                  Pattern: 'Microsoft.Forge.TreeWalker.dll'
                  OpusName: 'Microsoft Forge TreeWalker'
                  OpusInfo: 'https://www.github.com/microsoft/forge'
                  inlineOperation: |
                    [
                      {
                        "keyCode": "CP-230012",
                        "operationSetCode": "SigntoolSign",
                        "parameters": [
                          { "parameterName": "OpusName", "parameterValue": "Microsoft" },
                          { "parameterName": "OpusInfo", "parameterValue": "http://www.microsoft.com" },
                          { "parameterName": "Append", "parameterValue": "/as" },
                          { "parameterName": "FileDigest", "parameterValue": "/fd \"SHA256\"" },
                          { "parameterName": "PageHash", "parameterValue": "/NPH" },
                          { "parameterName": "TimeStamp", "parameterValue": "/tr \"http://rfc3161.gtm.corp.microsoft.com/TSS/HttpTspServer\" /td sha256" }
                        ],
                        "toolName": "sign",
                        "toolVersion": "1.0"
                      },
                      {
                        "keyCode": "CP-230012",
                        "operationSetCode": "SigntoolVerify",
                        "parameters": [],
                        "toolName": "sign",
                        "toolVersion": "1.0"
                      }
                    ]

              # 8. ESRP CodeSigning - NuGet MI
              - task: EsrpCodeSigning@5
                displayName: 'ESRP CodeSigning - NuGet MI'
                inputs:
                  ConnectedServiceName: 'ForgeManagedIdentity'
                  UseMSIAuthentication: true
                  AppRegistrationClientId: 'ee5bddcd-7e6d-40c7-a645-8f0be9da4e24'
                  AppRegistrationTenantId: '33e01921-4d64-4f8c-a055-5bdaffd5e33d'
                  EsrpClientId: 'ec6597cc-b900-43a4-9d2b-ffc5cc4f8c56'
                  AuthAKVName: 'ForgeKeyVault2'
                  AuthSignCertName: 'ForgeKeyVault2Certificate'
                  ServiceEndpointUrl: 'https://api.esrp.microsoft.com/api/v2'
                  signConfigType: 'inlineSignParams'
                  FolderPath: '$(Build.SourcesDirectory)\Forge.TreeWalker\bin\Release'
                  Pattern: 'Microsoft.Forge.TreeWalker*.symbols.nupkg'
                  inlineOperation: |
                    [
                      {
                        "keyCode": "CP-401405",
                        "operationSetCode": "NuGetSign",
                        "parameters": [],
                        "toolName": "sign",
                        "toolVersion": "1.0"
                      },
                      {
                        "keyCode": "CP-401405",
                        "operationSetCode": "NuGetVerify",
                        "parameters": [],
                        "toolName": "sign",
                        "toolVersion": "1.0"
                      }
                    ]
                  SessionTimeout: '60'
                  MaxConcurrency: '50'
                  MaxRetryAttempts: '5'

              # 9. NuGet push AzureArtifacts
              - task: NuGetCommand@2
                displayName: 'NuGet push AzureArtifacts'
                inputs:
                  command: push
                  packagesToPush: '$(Build.SourcesDirectory)\Forge.TreeWalker\bin\Release\Microsoft.Forge.TreeWalker*.symbols.nupkg'
                  publishVstsFeed: 'One/ForgeArtifacts'
                  allowPackageConflicts: true
