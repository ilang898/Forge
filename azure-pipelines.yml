trigger:
- master

parameters: # parameters are shown up in ADO UI in a build queue time
- name: 'debug'
  displayName: 'Enable debug output'
  type: boolean
  default: false

variables:
  CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)] # needed for onebranch.pipeline.version task https://aka.ms/obpipelines/versioning
  system.debug: ${{ parameters.debug }}
  ENABLE_PRS_DELAYSIGN: 0
  ROOT: $(Build.SourcesDirectory)
  REPOROOT: $(Build.SourcesDirectory)
  OUTPUTROOT: $(REPOROOT)\out
  NUGET_XMLDOC_MODE: none
  WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2019/vse2022:latest' # Docker image which is used to build the project https://aka.ms/obpipelines/containers

resources:
  repositories: 
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates # https://aka.ms/obpipelines/templates
  parameters:
    featureFlags:
      LinuxHostVersion:
        Network: KS1
      WindowsHostVersion:
        Network: KS1
    globalSdl: # https://aka.ms/obpipelines/sdl
      tsa:
        enabled: false # onebranch publish all sdl results to TSA. If TSA is disabled all SDL tools will forced into 'break' build mode.
      # credscan:
      #   suppressionsFile: $(Build.SourcesDirectory)\.config\CredScanSuppressions.json
      binskim:
        break: true # always break the build on binskim issues. You can disable it by setting to 'false'
      policheck:
        break: true # always break the build on policheck issues. You can disable it by setting to 'false'
      # suppression:
      #   suppressionFile: $(Build.SourcesDirectory)\.gdn\global.gdnsuppress

    stages:
    - stage: build
      jobs:
      - job: main
        pool:
          type: windows  # read more about custom job pool types at https://aka.ms/obpipelines/yaml/jobs
          vmImage: 'windows-2019'
        
        variables: # More settings at https://aka.ms/obpipelines/yaml/jobs
          ob_outputDirectory: '$(Build.SourcesDirectory)/dist' # this directory is uploaded to pipeline artifacts, reddog and cloudvault. More info at https://aka.ms/obpipelines/artifacts
          ob_sdl_binskim_break: true # https://aka.ms/obpipelines/sdl
          ob_artifactBaseName: PRPipelineArtifacts
          # ob_sdl_suppression_suppressionFile: $(Build.SourcesDirectory)\.gdn\build.nonofficial.gdnsuppress

        steps:
          - task: NuGetCommand@2
            displayName: 'NuGet restore'
            inputs:
              restoreSolution: '$(Build.SourcesDirectory)\Forge.sln'
              
          - task: VSBuild@1
            displayName: 'Build .NET sln for tests'
            inputs:
              solution: '$(Build.SourcesDirectory)\Forge.sln'
              platform: 'Any CPU'
              configuration: Release
              
          - task: VSTest@2
            displayName: 'Run Tests'
            inputs:
              testAssemblyVer2: | 
                $(Build.SourcesDirectory)\Forge.TreeWalker.UnitTests\obj\Release\Microsoft.Forge.TreeWalker.UnitTests.dll
              runInParallel: True
              
          - task: VSBuild@1
            displayName: 'Build .NET sln and pack'
            inputs:
              solution: '$(Build.SourcesDirectory)\Forge.sln'
              platform: 'Any CPU'
              configuration: Release
              msbuildArgs: '-t:pack'
              
          - task: UseDotNet@2
            inputs:
              packageType: 'sdk'
              version: '6.0.100'
          - task: UseDotNet@2
            inputs:
              packageType: 'runtime'
              version: '2.1.23'
              
          - task: EsrpCodeSigning@5
            displayName: 'ESRP CodeSigning - Authenticode MI'
            inputs:
              ConnectedServiceName: 'ForgeManagedIdentity'
              UseMSIAuthentication: true
              AppRegistrationClientId: 'ee5bddcd-7e6d-40c7-a645-8f0be9da4e24'
              AppRegistrationTenantId: '33e01921-4d64-4f8c-a055-5bdaffd5e33d'
              EsrpClientId: 'ec6597cc-b900-43a4-9d2b-ffc5cc4f8c56'
              AuthAKVName: 'ForgeKeyVault2'
              AuthSignCertName: 'ForgeKeyVault2Certificate'
              ServiceEndpointUrl: 'https://api.esrp.microsoft.com/api/v2'
              signConfigType: 'inlineSignParams'
              FolderPath: '$(Build.SourcesDirectory)\Forge.TreeWalker\bin\Release'
              Pattern: 'Microsoft.Forge.TreeWalker.dll'
              OpusName: 'Microsoft Forge TreeWalker'
              OpusInfo: 'https://www.github.com/microsoft/forge'
              inlineOperation: |
               [  {
                       "keyCode": "CP-230012",
                       "operationSetCode": "SigntoolSign",
                       "parameters": [
                       {
                           "parameterName": "OpusName",
                           "parameterValue": "Microsoft"
                       },
                       {
                           "parameterName": "OpusInfo",
                           "parameterValue": "http://www.microsoft.com"
                       },
                       {
                           "parameterName": "Append",
                           "parameterValue": "/as"
                       },
                       {
                           "parameterName": "FileDigest",
                           "parameterValue": "/fd \"SHA256\""
                       },
                       {
                           "parameterName": "PageHash",
                           "parameterValue": "/NPH"
                       },
                       {
                           "parameterName": "TimeStamp",
                           "parameterValue": "/tr \"http://rfc3161.gtm.corp.microsoft.com/TSS/HttpTspServer\" /td sha256"
                       }
                       ],
                       "toolName": "sign",
                       "toolVersion": "1.0"
                   },
                   {
                       "keyCode": "CP-230012",
                       "operationSetCode": "SigntoolVerify",
                       "parameters": [ ],
                       "toolName": "sign",
                       "toolVersion": "1.0"
                   }]
          - task: EsrpCodeSigning@5
            displayName: 'ESRP CodeSigning - NuGet MI'
            inputs:
              ConnectedServiceName: 'ForgeManagedIdentity'
              UseMSIAuthentication: true
              AppRegistrationClientId: 'ee5bddcd-7e6d-40c7-a645-8f0be9da4e24'
              AppRegistrationTenantId: '33e01921-4d64-4f8c-a055-5bdaffd5e33d'
              EsrpClientId: 'ec6597cc-b900-43a4-9d2b-ffc5cc4f8c56'
              AuthAKVName: 'ForgeKeyVault2'
              AuthSignCertName: 'ForgeKeyVault2Certificate'
              ServiceEndpointUrl: 'https://api.esrp.microsoft.com/api/v2'
              signConfigType: 'inlineSignParams'
              FolderPath: '$(Build.SourcesDirectory)\Forge.TreeWalker\bin\Release'
              Pattern: 'Microsoft.Forge.TreeWalker*.symbols.nupkg'
              inlineOperation: |
                [ 
                   {
                       "keyCode": "CP-401405",
                       "operationSetCode": "NuGetSign",
                       "parameters": [ ],
                       "toolName": "sign",
                       "toolVersion": "1.0"
                   },
                   {
                       "keyCode": "CP-401405",
                       "operationSetCode": "NuGetVerify",
                       "parameters": [ ],
                       "toolName": "sign",
                       "toolVersion": "1.0"
                   }
                ]
              SessionTimeout: '60'
              MaxConcurrency: '50'
              MaxRetryAttempts: '5'

          - task: NuGetCommand@2
            displayName: 'NuGet push AzureArtifacts'
            inputs:
              command: push
              packagesToPush: '$(Build.SourcesDirectory)\Forge.TreeWalker\bin\Release\Microsoft.Forge.TreeWalker*.symbols.nupkg'
              publishVstsFeed: 'One/ForgeArtifacts'
              allowPackageConflicts: true
