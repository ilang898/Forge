trigger:
- master

resources:
  repositories:
  - repository: onebranchTemplates
    type: git
    name: OneBranch.Pipelines/GovernedTemplates
    ref: refs/heads/main

variables:
  WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2019/vse2019:latest'

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@onebranchTemplates
  parameters:
    globalSdl:
      tsa:
        enabled: false
      policheck:
        break: true
    stages:
    - stage: stage
      jobs:
      - job: job
        pool:
          type: windows
        variables:
        - name: ob_nugetPublishing_enabled
          value: true
        - name: ob_outputDirectory
          value: '$(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT'
        steps:
        - powershell: |
              # Enhanced TLS configuration for OneBranch containers
              [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12 -bor [Net.SecurityProtocolType]::Tls13
              [Net.ServicePointManager]::CheckCertificateRevocationList = $false
              [Net.ServicePointManager]::DefaultConnectionLimit = 100
              
              Write-Host "Enhanced TLS configuration applied"
              Write-Host "Testing connectivity to NuGet.org with enhanced settings..."
              
              try {
                # Try with custom headers that work better in container environments
                $headers = @{
                  'User-Agent' = 'NuGet Command Line/6.0.0 (Microsoft Windows NT 10.0.17763.0)'
                }
                $resp = Invoke-WebRequest -Uri "https://api.nuget.org/v3/index.json" -UseBasicParsing -Headers $headers -TimeoutSec 30
                Write-Host "NuGet.org is reachable with enhanced settings."
                Write-Host "Response status: $($resp.StatusCode)"
              } catch {
                Write-Host "NuGet.org is still NOT reachable with enhanced settings."
                Write-Host "Error: $_"
                Write-Host "Will proceed with NuGet restore using fallback methods..."
                # Don't exit - let NuGet restore handle retries
              }
          displayName: "Test NuGet.org connectivity with enhanced TLS"

        - task: NuGetCommand@2
          displayName: 'NuGet restore with enhanced configuration'
          inputs:
            restoreSolution: '$(Build.SourcesDirectory)\Forge.sln'
            nugetConfigPath: '$(Build.SourcesDirectory)\nuget.config'
            verbosityRestore: 'detailed'
          retryCountOnTaskFailure: 5
          env:
            NUGET_HTTP_CACHE_PATH: '$(Agent.TempDirectory)\nuget-cache'
            NUGET_PACKAGES: '$(Agent.TempDirectory)\nuget-packages'

        # Fallback: Use dotnet restore if NuGet restore fails
        - task: DotNetCoreCLI@2
          displayName: 'Fallback: dotnet restore'
          condition: failed()
          inputs:
            command: 'restore'
            projects: '$(Build.SourcesDirectory)\Forge.sln'
            verbosityRestore: 'detailed'
          retryCountOnTaskFailure: 3

        - task: VSBuild@1
          displayName: 'Build .NET sln for tests'
          inputs:
            solution: '$(Build.SourcesDirectory)\Forge.sln'
            platform: 'Any CPU'
            configuration: Release
